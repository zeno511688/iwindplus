networks:
  app:
    external: true
    name: iwindplus-app
services:
  iwindplus-monitor:
    build:
      context: iwindplus-monitor
      dockerfile: Dockerfile
      args:
        JAR_FILE: "*.jar"
    image: iwindplus-monitor:latest
    hostname: iwindplus-monitor
    container_name: iwindplus-monitor
    restart: always
    privileged: true
    environment:
      - TZ=Asia/Shanghai
      - PROFILE_ACTIVE=uat
      - NACOS_SERVER_ADDR=127.0.0.1:8848
      - NACOS_NAMESPACE=iwindplus-uat
      - NACOS_GROUP=IWINDPLUS_GROUP
      - NACOS_USERNAME=nacos
      - NACOS_PASSWORD=zaq12wsx
      - NACOS_WATCH_ENABLED=true
      - NACOS_CLUSTER=iwindplus-uat
      - NACOS_CONFIG_ENABLED=true
      - APP_VESION=v1
      - JAVA_OPTS=-Xmx512m -Xms512m -Xmn192m -XX:+UseStringDeduplication -XX:+TieredCompilation -XX:+UseZGC -XX:ZCollectionInterval=30 -XX:ZAllocationSpikeTolerance=5 -Xlog:safepoint,classhisto*=trace,age*,gc*=info:file=logs/gc-%t.log:time,tid,tags:filecount=5,filesize=50m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=logs/errorDump.hprof
    expose:
      - "9005"
    ports:
      - "9005:9005"
    networks:
      - app
    volumes:
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime
      - ./iwindplus-monitor/logs:/home/logs
