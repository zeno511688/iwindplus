  enabledCollect: true
  enabledBanner: true
  collectorTypes: micrometer
  monitorInterval: 5
  platforms:
    - platform: lark
      platformId: 1
      urlKey: e479bf95-3d8e-43a3-9d38-7f0db242c9d8
      secret: 3XcRTx6zi3GqOgIAYZKhbb
      receivers: test1,test2
  globalExecutorProps:
    rejectedHandlerType: CallerRunsPolicy
    queueType: VariableLinkedBlockingQueue
    waitForTasksToCompleteOnShutdown: true
    awaitTerminationSeconds: 3
    taskWrapperNames: [ "micrometer", "ttl", "mdc" ]
    queueTimeout: 300
    runTimeout: 300
    notifyEnabled: true
    notifyItems:
      - type: change
        silencePeriod: 120
      - type: capacity
        threshold: 80
        count: 2
        period: 30
        silencePeriod: 0
      - type: liveness
        threshold: 80
        count: 3
        period: 30
        silencePeriod: 0
      - type: reject
