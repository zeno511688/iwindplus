  executors:
    - threadPoolName: asyncTaskExecutor
      threadPoolAliasName: 异步任务线程池
      executorType: eager
      corePoolSize: 8
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: asyncTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: i18nTaskExecutor
      threadPoolAliasName: 国际化线程池
      executorType: eager
      corePoolSize: 2
      maximumPoolSize: 4
      queueCapacity: 50
      threadNamePrefix: i18nTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: httpClientTaskExecutor
      threadPoolAliasName: http调用客户端线程池
      executorType: eager
