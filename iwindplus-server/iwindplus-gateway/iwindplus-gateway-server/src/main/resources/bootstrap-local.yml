      corePoolSize: 8
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: kafkaListerTask
      runTimeout: 0
      queueTimeout: 0
      platformIds: [ 1 ]
spring:
  reactor:
    context-propagation: AUTO
  redis:
    # 序列化类型
    serialize-type: PROTOSTUFF
    idempotent:
      # 是否开启redis幂等（防重复提交）
      enabled: true
    lock:
      # 是否开启redis锁
      enabled: true
    rate-limiter:
      # 是否开启redis限流
      enabled: true
    redisson:
      config: |
        singleServerConfig:
          address: redis://127.0.0.1:6379
          password: 9&^7WR!#vnLs
          database: 6
          connectionMinimumIdleSize: 1
          connectionPoolSize: 2
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 2
  cloud:
    circuitbreaker:
      resilience4j:
        enabled: true
    gateway:
      httpclient:
        pool:
          type: ELASTIC
          max-connections: 4000
          max-connections-per-route: 500
          acquire-timeout: 45000
          max-idle-time: 60s
          max-life-time: 300s
        # 连接超时时间
        connect-timeout: 10000
        # 响应超时时间
        response-timeout: 10s
        # 请求行最大长度
        max-initial-line-length: 8KB
        # header 最大长度
        max-header-size: 64KB
        ssl:
          handshake-timeout: 5s
          close-notify-flush-timeout: 3s
        compression: true
        wiretap: false
      discovery:
        locator:
          # 是否与服务发现组件进行结合，通过serviceId转发到具体服务实例
          # 是否开启基于服务发现的路由规则
          enabled: true
          # 是否将服务名称转换小写
          lower-case-service-id: true
      metrics:
        enabled: true
    loadbalancer:
      cache:
        # 开启缓存，如果注册中心有自己的缓存，那么就可以禁用loadbalancer的缓存
        enabled: true
        # 过期时间10s
        ttl: 10
        # 容量256M
        capacity: 256
        caffeine:
          spec: initialCapacity=500,expireAfterWrite=5s
    sentinel:
      enabled: false
      namespace: sentinel
      group-id: SENTINEL_GROUP
      data-type: json
      filter:
        enabled: false
      eager: true
      transport:
        dashboard: 127.0.0.1:8880
        # 这个不能重复，不同模块不同的port
        port: 8720
        client-ip: 127.0.0.1
      log:
        dir: ./logs/sentinel
      scg:
        enabled: true
        fallback:
          mode: response
          response-status: 426
          response-body: '{"bizStatus":426, "bizCode": "frequent_requests", "bizMessage":"请求过于频繁，请稍后重试"}'
      datasource:
        # 流量控制
        gw-flow:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.sentinel.namespace}
            data-id: ${spring.application.name}-gateway-flow-rules
            group-id: ${spring.cloud.sentinel.group-id}
            rule-type: gw-flow
            data-type: ${spring.cloud.sentinel.data-type}
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}
        # API管理规则
        gw-api-group:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.sentinel.namespace}
            data-id: ${spring.application.name}-gateway-api-group
            group-id: ${spring.cloud.sentinel.group-id}
            rule-type: gw-api-group
            data-type: ${spring.cloud.sentinel.data-type}
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}
        # 熔断降级
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.sentinel.namespace}
            data-id: ${spring.application.name}-degrade-rules
            group-id: ${spring.cloud.sentinel.group-id}
            rule-type: degrade
            data-type: ${spring.cloud.sentinel.data-type}
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}
        # 系统规则
        system:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.sentinel.namespace}
            data-id: ${spring.application.name}-system-rules
            group-id: ${spring.cloud.sentinel.group-id}
            rule-type: system
            data-type: ${spring.cloud.sentinel.data-type}
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}
  mvc:
