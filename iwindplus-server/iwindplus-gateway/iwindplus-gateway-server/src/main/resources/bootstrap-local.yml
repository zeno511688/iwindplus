server:
  # 配置启动的接口
  port: 9000
  shutdown: graceful
  servlet:
    application-display-name: 网关服务
    encoding:
      force: true
      force-request: true
      force-response: true
  undertow:
    threads:
      io: 16
      worker: 256
    buffer-size: 1024
    direct-buffers: true
cross:
  # 是否开启跨域
  enabled: true
gateway:
  rate-limiter:
    # 是否开启限流过滤器
    enabled: true
    # 最大缓存数量
    maxSize: 1000
    # 缓存超时时间
    cache-timeout: 10m
    # 缓存刷新时间
    cache-refresh: 15m
    # 限流类型（可选，默认：OVERALL）
    rate-type: OVERALL
    # 限流次数，每个时间窗口允许请求数量（可选，默认：1000）
    rate: 2000
    # 限流速率（可选，默认：1s）
    rate-interval: 1s
  base:
    # 是否开启基础过滤器
    enabled: true
    # 是否启用从cookie中读取token
    enabled-auth-cookie: false
    # 是否启用相对路径
    enabled-relative-path: false
  api-white-list:
    # API白名单过滤器
    enabled: true
    # 最大缓存数量
    maxSize: 1000
    # 缓存超时时间
    cache-timeout: 10m
    # 缓存刷新时间
    cache-refresh: 15m
    # 忽略的API
    ignored-api:
      - /admin/imWs/ws
      - /admin/setup/wechat/getWechatMpQrCode
      - /admin/setup/wechat/getWechatMpQrCodeCallback
      - /admin/setup/wechat/getWechatMaCodeByMobile
      - /admin/setup/wechat/getWechatMaCodeByUserInfo
      - /admin/setup/wechat/getWechatMaQrCode
      - /admin/setup/sms/sendCaptcha
      - /admin/setup/mailbox/sendCaptcha
      - /admin/setup/oss/uploadFile
      - /admin/mgt/thirdBindGrant/editUser
  ip-black-list:
    # 是否开启IP黑名单过滤器
    enabled: true
    # 最大缓存数量
    maxSize: 1000
    # 缓存超时时间
    cache-timeout: 10m
    # 缓存刷新时间
    cache-refresh: 15m
  api-sign:
    # 是否开启API签名过滤器
    enabled: true
    # 最大缓存数量
    maxSize: 1000
    # 缓存超时时间
    cache-timeout: 10m
    # 缓存刷新时间
    cache-refresh: 15m
    # 忽略拦截的API
    ignored-api:
      - /static/**
      - /doc.html
      - /api-docs
      - /inner/**
      - /actuator/**
      - /admin/imWs/ws
      - /oauth2/token
  auth:
    # 是否开启权限过滤器
    enabled: true
    # 是否启用远程token校验
    enabled-remote-token: false
    # 是否开启API权限过滤器
    enabled-api-permission: false
    # token最大缓存数量
    token-maxSize: 1000
    # token缓存超时时间
    token-cache-timeout: 5m
    # token缓存刷新时间
    token-cache-refresh: 10m
    # 权限最大缓存数量
    permission-maxSize: 1000
    # 权限缓存超时时间
    permission-cache-timeout: 10m
    # 权限缓存刷新时间
    permission-cache-refresh: 15m
    # 忽略鉴权的API
    ignored-api:
      - /admin/auth/oauth2/logout
      - /admin/setup/mail/config/listEnabled
      - /admin/setup/mail/tpl/listDisabled
      - /admin/setup/oss/listSignUrl
      - /admin/im/direct/msg/editMsgStatus
    # 通用都有权限的API
    general-api:
      - /admin/mgt/user/getUserInfo
      - /admin/mgt/user/editChangeOrg
      - /admin/mgt/user/getGaQrcode
      - /admin/mgt/user/editGaBindFlag
      - /admin/log/login/log/getLoginInfo
  log:
    # 是否开启日志过滤器
    enabled: true
    # 是否启用记录错误日志
    enabled-error: true
    # 采样率（10：代表10%的采样率）
    sample-rate: 100
    # 是否启用获取请求头
    enabled-request-header: true
    # 是否启用获取请求参数
    enabled-request-param: true
    # 是否启用获取请求体
    enabled-request-body: true
    # 请求体限制大小，超过部分丢弃，单位：KB
    limit-request-body: 2
    # 是否启用获取响应头
    enabled-response-header: true
    # 是否启用获取响应体
    enabled-response-body: true
    # 响应体限制大小，超过部分丢弃，单位：KB
    limit-response-body: 2
    # 忽略的API
    ignored-api:
      - /admin/imWs/ws
      - /admin/setup/region/**
      - /admin/log/gateway/log/**
      - /admin/log/login/log/**
      - /admin/log/operation/log/**
