    enabled: false
# 全局默认熔断策略
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 失败率阈值，达到50%触发熔断
        failureRateThreshold: 50
        # 慢调用率阈值
        slowCallRateThreshold: 80
        # 慢调用时间阈值（毫秒）
        slowCallDurationThreshold: 1000
        # 熔断器开启持续时间（秒）
        waitDurationInOpenState: 10s
        # 允许半开状态的最大调用数
        permittedNumberOfCallsInHalfOpenState: 3
        # 滑动窗口大小
        slidingWindowSize: 10
        # 最小调用次数才计算失败率
        minimumNumberOfCalls: 5
        # 自动从打开状态过渡到半开状态
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # 仅以下异常计入失败
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    # 留空即可，全部走 default
    instances: {}
  timelimiter:
    configs:
      default:
        # 单次调用硬超时 3 s（覆盖 Feign 默认 1 s）
        timeout-duration: 3s
  # 重试配置（可选）
  retry:
    configs:
      default:
        # 含首次，共 3 次
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 1.5
  # 限流配置（可选）
  ratelimiter:
    configs:
      default:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 1000
  # 隔离配置（可选）
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 0
dynamictp:
