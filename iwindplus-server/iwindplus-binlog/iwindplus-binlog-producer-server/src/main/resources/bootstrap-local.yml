# 全局默认熔断策略
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 失败率阈值，达到50%触发熔断
        failureRateThreshold: 50
        # 慢调用率阈值
        slowCallRateThreshold: 80
        # 慢调用时间阈值（毫秒）
        slowCallDurationThreshold: 1000
        # 熔断器开启持续时间（秒）
        waitDurationInOpenState: 10s
        # 允许半开状态的最大调用数
        permittedNumberOfCallsInHalfOpenState: 3
        # 滑动窗口大小
        slidingWindowSize: 10
        # 最小调用次数才计算失败率
        minimumNumberOfCalls: 5
        # 自动从打开状态过渡到半开状态
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # 仅以下异常计入失败
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    # 留空即可，全部走 default
    instances: {}
  timelimiter:
    configs:
      default:
        # 单次调用硬超时 3 s（覆盖 Feign 默认 1 s）
        timeout-duration: 3s
  # 重试配置（可选）
  retry:
    configs:
      default:
        # 含首次，共 3 次
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 1.5
  # 限流配置（可选）
  ratelimiter:
    configs:
      default:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 1000
  # 隔离配置（可选）
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 0
dynamictp:
  enabled: true
  enabledCollect: true
  enabledBanner: true
  collectorTypes: micrometer
  monitorInterval: 5
  platforms:
    - platform: lark
      platformId: 1
      urlKey: e479bf95-3d8e-43a3-9d38-7f0db242c9d8
      secret: 3XcRTx6zi3GqOgIAYZKhbb
      receivers: test1,test2
  globalExecutorProps:
    rejectedHandlerType: CallerRunsPolicy
    queueType: VariableLinkedBlockingQueue
    waitForTasksToCompleteOnShutdown: true
    awaitTerminationSeconds: 3
    taskWrapperNames: [ "micrometer", "ttl", "mdc" ]
    queueTimeout: 300
    runTimeout: 300
    notifyEnabled: true
    notifyItems:
      - type: change
        silencePeriod: 120
      - type: capacity
        threshold: 80
        count: 2
        period: 30
        silencePeriod: 0
      - type: liveness
        threshold: 80
        count: 3
        period: 30
        silencePeriod: 0
      - type: reject
        count: 1
        period: 30
        silencePeriod: 0
      - type: run_timeout
        count: 20
        period: 30
        silencePeriod: 30
      - type: queue_timeout
        count: 5
        period: 30
        silencePeriod: 0
  executors:
    - threadPoolName: asyncTaskExecutor
      threadPoolAliasName: 异步任务线程池
      executorType: eager
      corePoolSize: 8
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: asyncTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: i18nTaskExecutor
      threadPoolAliasName: 国际化线程池
      executorType: eager
      corePoolSize: 2
      maximumPoolSize: 4
      queueCapacity: 50
      threadNamePrefix: i18nTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: httpClientTaskExecutor
      threadPoolAliasName: http调用客户端线程池
      executorType: eager
      corePoolSize: 16
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: httpClientTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: binlogTaskExecutor
      threadPoolAliasName: binlog线程池
      executorType: eager
      corePoolSize: 16
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: binlogTask
      runTimeout: 0
      platformIds: [ 1 ]
      preStartAllCoreThreads: true
    - threadPoolName: binlogTaskScheduler
      threadPoolAliasName: binlog调度线程池
      executorType: scheduled
      corePoolSize: 5
      maximumPoolSize: 10
      threadNamePrefix: binlogScheduler
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: kafkaListerTaskExecutor
      threadPoolAliasName: kafka默认集群监听线程池
      executorType: eager
      corePoolSize: 8
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: kafkaListerTask
      runTimeout: 0
      queueTimeout: 0
      platformIds: [ 1 ]
spring:
  cloud:
    circuitbreaker:
      resilience4j:
        enabled: true
    openfeign:
      circuitbreaker:
        # 开启服务熔断
        enabled: true
        group:
          enabled: true
      micrometer:
        enabled: true
      compression:
        request:
          enabled: false
        response:
          enabled: false
      httpclient:
        hc5:
          enabled: true
          connection-request-timeout: 3
          socket-timeout: 10
          pool-reuse-policy: fifo
          pool-concurrency-policy: STRICT
        # 默认连接超时时间：2000毫秒
        connection-timeout: 5000
        # 连接池管理定时器执行频率：默认 3000（单位：毫秒）
        connection-timer-repeat: 5000
        # 连接池最大连接数，默认200
        max-connections: 500
        # 每一个IP最大占用多少连接 默认 50
        max-connections-per-route: 200
        # 连接池中存活时间，默认为5
        time-to-live: 10
        time-to-live-unit: minutes
        ok-http:
          read-timeout: 10000
      client:
        config:
          # default代表所有服务
          default:
            # 日志级别
            loggerLevel: FULL
            # feign客户端建立连接超时时间（单位：毫秒）
            connect-timeout: 5000
            # feign客户端建立连接后读取资源超时时间（单位：毫秒）
            read-timeout: 10000
      okhttp:
        enabled: false
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
  jmx:
    enabled: true
  messages:
    basename: i18n/messages
    fallback-to-system-locale: true
    cache-duration: -1
    # 是否开启远程消息源
    enabled-remote: true
    # nacos分组名称
    group: I18N_GROUP
  servlet:
    multipart:
      enabled: true
      maxFileSize: 1GB
      maxRequestSize: 10GB
kafka:
  multi:
    enabled: true
    default-cluster: default
    enabled-dynamic-register: true
    default-replicas: 1
    default-partitions: 3
    clusters:
      default:
        bootstrap-servers: 127.0.0.1:9092
        # 生产者配置
        producer:
          client-id: default-producer
          retries: 5
          batch-size: 16384
          linger-ms: 10
          buffer-memory: 67108864
          acks: all
          enabled-dempotence: true
          compression-type: lz4
          enable-transaction: false
          transaction-id-prefix: default-tx-
          max-block-ms: 60000
          request-timeout-ms: 30000
          max-request-size: 1048576
          max-in-flight-requests-per-connection: 5
          reconnect-backoff-ms: 1000
          retry-backoff-ms: 500
          enable-reactive: true
          properties:
            max.in.flight.requests.per.connection: 3
        # 消费者配置
        consumer:
          group: default-consumer-group
          client-id: default-consumer
          concurrency: 3
          thread-pool-name: kafkaListerTaskExecutor
          enable-auto-commit: false
          ack-mode: MANUAL
          auto-commit-interval-ms: 1000
          auto-offset-reset: earliest
          max-poll-records: 500
          max-poll-interval-ms: 600000
          session-timeout-ms: 10000
          heartbeat-interval-ms: 3000
          fetch-min-bytes: 1
          fetch-max-bytes: 524288
          max-partition-fetch-bytes: 1048576
          enabled-batch-listener: true
          ack-count: 1
          ack-time: 10000
          properties:
            fetch.max.wait.ms: 500
          localRetry:
            # 是否开启本地重试
            enabled: true
          # 绑定关系配置
