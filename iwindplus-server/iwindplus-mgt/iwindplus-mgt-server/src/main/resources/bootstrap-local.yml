kafka:
  multi:
    enabled: true
    default-cluster: default
    enabled-dynamic-register: true
    default-replicas: 1
    default-partitions: 3
    clusters:
      default:
        bootstrap-servers: 127.0.0.1:9092
        # 生产者配置
        producer:
          client-id: default-producer
          retries: 5
          batch-size: 16384
          linger-ms: 10
          buffer-memory: 67108864
          acks: all
          enabled-dempotence: true
          compression-type: lz4
          enable-transaction: false
          transaction-id-prefix: default-tx-
          max-block-ms: 60000
          request-timeout-ms: 30000
          max-request-size: 1048576
          max-in-flight-requests-per-connection: 5
          reconnect-backoff-ms: 1000
          retry-backoff-ms: 500
          properties:
            max.in.flight.requests.per.connection: 3
        # 消费者配置
        consumer:
          group: default-consumer-group
          client-id: default-consumer
          concurrency: 3
          thread-pool-name: kafkaListerTaskExecutor
          enable-auto-commit: false
          ack-mode: MANUAL
          auto-commit-interval-ms: 1000
          auto-offset-reset: earliest
          max-poll-records: 500
          max-poll-interval-ms: 600000
          session-timeout-ms: 10000
          heartbeat-interval-ms: 3000
          fetch-min-bytes: 1
          fetch-max-bytes: 524288
          max-partition-fetch-bytes: 1048576
          enabled-batch-listener: true
          ack-count: 1
          ack-time: 10000
          enable-reactive: true
          properties:
            fetch.max.wait.ms: 500
          localRetry:
            # 是否开启本地重试
            enabled: true
          # 绑定关系配置
          bindings:
            - topic: iwindplus-appCert-topic
              group: iwindplus-appCert-group
              # 是否自动创建
              auto-create: true
              # 是否启用死信队列
              enabled-dlq: true
            - topic: iwindplus-apiWhiteList-topic
              group: iwindplus-apiWhiteList-group
              # 是否自动创建
              auto-create: true
              # 是否启用死信队列
              enabled-dlq: true
            - topic: iwindplus-ipBlackList-topic
              group: iwindplus-ipBlackList-group
              # 是否自动创建
              auto-create: true
              # 是否启用死信队列
              enabled-dlq: true
