    enabled: true
    placeholder-replacement: false
    baseline-on-migrate: true
    locations: classpath:db
    table: flyway_schema_history
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
  datasource:
