# 全局默认熔断策略
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 失败率阈值，达到50%触发熔断
        failureRateThreshold: 50
        # 慢调用率阈值
        slowCallRateThreshold: 80
        # 慢调用时间阈值（毫秒）
        slowCallDurationThreshold: 1000
        # 熔断器开启持续时间（秒）
        waitDurationInOpenState: 10s
        # 允许半开状态的最大调用数
        permittedNumberOfCallsInHalfOpenState: 3
        # 滑动窗口大小
        slidingWindowSize: 10
        # 最小调用次数才计算失败率
        minimumNumberOfCalls: 5
        # 自动从打开状态过渡到半开状态
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # 仅以下异常计入失败
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    # 留空即可，全部走 default
    instances: {}
  timelimiter:
    configs:
      default:
        # 单次调用硬超时 3 s（覆盖 Feign 默认 1 s）
        timeout-duration: 3s
  # 重试配置（可选）
  retry:
    configs:
      default:
        # 含首次，共 3 次
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 1.5
  # 限流配置（可选）
  ratelimiter:
    configs:
      default:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 1000
  # 隔离配置（可选）
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 0
dynamictp:
  enabled: true
  enabledCollect: true
  enabledBanner: true
  collectorTypes: micrometer
  monitorInterval: 5
  platforms:
    - platform: lark
      platformId: 1
      urlKey: e479bf95-3d8e-43a3-9d38-7f0db242c9d8
      secret: 3XcRTx6zi3GqOgIAYZKhbb
      receivers: test1,test2
  globalExecutorProps:
    rejectedHandlerType: CallerRunsPolicy
    queueType: VariableLinkedBlockingQueue
    waitForTasksToCompleteOnShutdown: true
    awaitTerminationSeconds: 3
    taskWrapperNames: [ "micrometer", "ttl", "mdc" ]
    queueTimeout: 300
    runTimeout: 300
    notifyEnabled: true
    notifyItems:
      - type: change
        silencePeriod: 120
      - type: capacity
        threshold: 80
        count: 2
        period: 30
        silencePeriod: 0
      - type: liveness
        threshold: 80
        count: 3
        period: 30
        silencePeriod: 0
      - type: reject
        count: 1
        period: 30
        silencePeriod: 0
      - type: run_timeout
        count: 20
        period: 30
        silencePeriod: 30
      - type: queue_timeout
        count: 5
        period: 30
        silencePeriod: 0
  executors:
    - threadPoolName: idempotentTaskScheduler
      threadPoolAliasName: 幂等调度线程池
      executorType: scheduled
      corePoolSize: 2
      maximumPoolSize: 4
      threadNamePrefix: idempotentTask
      platformIds: [ 1 ]
      runTimeout: 5000
    - threadPoolName: asyncTaskExecutor
      threadPoolAliasName: 异步任务线程池
      executorType: eager
      corePoolSize: 8
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: asyncTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: i18nTaskExecutor
      threadPoolAliasName: 国际化线程池
      executorType: eager
      corePoolSize: 2
      maximumPoolSize: 4
      queueCapacity: 50
      threadNamePrefix: i18nTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: httpClientTaskExecutor
      threadPoolAliasName: http调用客户端线程池
      executorType: eager
      corePoolSize: 16
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: httpClientTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: asyncCmdTaskExecutor
      threadPoolAliasName: 异步命令线程池
      executorType: eager
      corePoolSize: 16
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: asyncCmdTask
      runTimeout: 5000
      platformIds: [ 1 ]
    - threadPoolName: kafkaListerTaskExecutor
      threadPoolAliasName: kafka默认集群监听线程池
      executorType: eager
      corePoolSize: 8
      maximumPoolSize: 32
      queueCapacity: 100
      threadNamePrefix: kafkaListerTask
      runTimeout: 0
      queueTimeout: 0
      platformIds: [ 1 ]
    - threadPoolName: kafkaLagTaskScheduler
      threadPoolAliasName: kafka消息堆积调度线程池
      executorType: scheduled
      corePoolSize: 2
      maximumPoolSize: 4
      threadNamePrefix: kafkaLagTask
      platformIds: [ 1 ]
      runTimeout: 5000
spring:
  cloud:
    circuitbreaker:
      resilience4j:
        enabled: true
    openfeign:
      circuitbreaker:
        # 开启服务熔断
        enabled: true
        group:
          enabled: true
      micrometer:
        enabled: true
      compression:
        request:
          enabled: false
        response:
          enabled: false
      httpclient:
        hc5:
          enabled: true
          connection-request-timeout: 3
          socket-timeout: 10
          pool-reuse-policy: fifo
          pool-concurrency-policy: STRICT
        # 默认连接超时时间：2000毫秒
        connection-timeout: 5000
        # 连接池管理定时器执行频率：默认 3000（单位：毫秒）
        connection-timer-repeat: 5000
        # 连接池最大连接数，默认200
        max-connections: 500
        # 每一个IP最大占用多少连接 默认 50
        max-connections-per-route: 200
        # 连接池中存活时间，默认为5
        time-to-live: 10
        time-to-live-unit: minutes
        ok-http:
          read-timeout: 10000
      client:
        config:
          # default代表所有服务
          default:
            # 日志级别
            loggerLevel: FULL
            # feign客户端建立连接超时时间（单位：毫秒）
            connect-timeout: 5000
            # feign客户端建立连接后读取资源超时时间（单位：毫秒）
            read-timeout: 10000
      okhttp:
        enabled: false
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
  jmx:
    enabled: true
  messages:
    basename: i18n/messages
    fallback-to-system-locale: true
    cache-duration: -1
    # 是否开启远程消息源
    enabled-remote: true
    # nacos分组名称
    group: I18N_GROUP
  servlet:
    multipart:
      enabled: true
      maxFileSize: 1GB
      maxRequestSize: 10GB
  # 初始化数据库
